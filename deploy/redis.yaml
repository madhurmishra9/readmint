# Optional cache. Gated by RF_REDIS_URL — omit this file to run cache-less.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: readmint-redis
  labels: { app: readmint-redis }
spec:
  replicas: 1
  selector:
    matchLabels: { app: readmint-redis }
  template:
    metadata:
      labels: { app: readmint-redis }
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
          ports: [{ containerPort: 6379 }]
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "250m", memory: "320Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: readmint-redis
  labels: { app: readmint-redis }
spec:
  selector: { app: readmint-redis }
  ports: [{ port: 6379, targetPort: 6379 }]
