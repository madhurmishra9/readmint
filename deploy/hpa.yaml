apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: readmint
  labels: { app: readmint }
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: readmint
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 70 }
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 120
