# Copy to secret.yaml, fill in, and apply out-of-band (never commit the real one).
apiVersion: v1
kind: Secret
metadata:
  name: readmint-secrets
  labels: { app: readmint }
type: Opaque
stringData:
  # Cortex LLM client-credentials
  RF_LLM_CLIENT_ID: "..."
  RF_LLM_CLIENT_SECRET: "..."
  # GitHub App
  RF_GH_APP_ID: "..."
  RF_GH_INSTALLATION_ID: "..."
  RF_GH_PRIVATE_KEY: |
    -----BEGIN RSA PRIVATE KEY-----
    ...
    -----END RSA PRIVATE KEY-----
  # Confluence
  RF_CONFLUENCE_TOKEN: "..."
  # Optional add-ons (omit to keep the app stateless)
  RF_REDIS_URL: "redis://readmint-redis:6379/0"
  RF_DATABASE_URL: "postgresql+psycopg://readmint:CHANGEME@readmint-pg:5432/readmint"
---
# oauth2-proxy needs its own secret (client id/secret + cookie secret).
apiVersion: v1
kind: Secret
metadata:
  name: readmint-oauth
  labels: { app: readmint }
type: Opaque
stringData:
  OAUTH2_PROXY_CLIENT_ID: "..."
  OAUTH2_PROXY_CLIENT_SECRET: "..."
  OAUTH2_PROXY_COOKIE_SECRET: "..."  # `openssl rand -base64 32`
