apiVersion: v1
kind: Service
metadata:
  name: readmint
  labels: { app: readmint }
spec:
  selector: { app: readmint }
  ports:
    # Ingress points here; oauth2-proxy fronts the app on 4180.
    - { name: http, port: 80, targetPort: 4180 }
    # Direct app port for in-cluster Prometheus scraping (bypasses auth).
    - { name: metrics, port: 8080, targetPort: 8080 }
