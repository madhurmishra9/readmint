# Corporate / air-gapped pip configuration.
# Point index-url at your internal mirror and trust it; the build and the
# running container both honour this file (copied to /etc/pip.conf in Docker).
[global]
index-url = https://pypi.org/simple
# index-url = https://artifactory.example.corp/api/pypi/pypi-remote/simple
# trusted-host = artifactory.example.corp
timeout = 60
retries = 5
